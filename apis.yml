aid: rawg
name: RAWG
description: >-
  RAWG is the largest video game database and game discovery service,
  providing access to more than 350,000 games across 50+ platforms with rich
  metadata including tags, genres, developers, publishers, creators, release
  dates, Metacritic ratings, store links, ESRB ratings, average playtime,
  achievements, screenshots, trailers, and social media data. RAWG offers a
  free REST API for personal and small commercial use with API key
  authentication, enabling developers to search and filter games by platform,
  genre, developer, publisher, tag, release date, and rating. The API also
  provides endpoints for exploring game series, DLCs, development team
  members, and visually similar games (enterprise tier). RAWG is used by
  developers building game discovery apps, recommendation engines, gaming
  dashboards, and data warehouses.
