apis:
  - aid: rawg:rawg
    name: RAWG Video Games Database API
    description: >-
      The RAWG Video Games Database API provides programmatic access to a
      catalog of more than 350,000 games across 50+ platforms, including
      creator roles, individual creators, game developers, game publishers,
      genres, tags, storefronts, platforms, and detailed game metadata. The
      API supports pagination, search, and multi-dimensional filtering across
      dates, platforms, genres, tags, Metacritic scores, and more. All
      requests require an API key passed as a query parameter.
