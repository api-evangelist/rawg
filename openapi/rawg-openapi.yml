openapi: 3.0.3
info:
  title: RAWG Video Games Database API
  description: >-
    The largest open video games database. More than 350,000 games for 50
    platforms including mobiles. Rich metadata: tags, genres, developers,
    publishers, individual creators, official websites, release dates,
    Metacritic ratings, store links, ESRB ratings, playtime, achievements,
    screenshots, and social data. API key authentication is required for all
    requests.
  version: v1.0
  termsOfService: https://rawg.io/terms
  contact:
    email: api@rawg.io
servers:
  - url: https://api.rawg.io/api
    description: RAWG Production API
security:
  - ApiKeyAuth: []
tags:
  - name: Creator Roles
    description: Game creator position/role types
  - name: Creators
    description: Individual game creators and development team members
  - name: Developers
    description: Game development studios and companies
  - name: Games
    description: Video games catalog with metadata, filtering, and related resources
  - name: Genres
    description: Video game genre categories
  - name: Platforms
    description: Gaming hardware and software platforms
  - name: Publishers
    description: Game publishing companies
  - name: Stores
    description: Digital and physical game storefronts
  - name: Tags
    description: Game tags and descriptive labels
paths:
  /creator-roles:
    get:
      operationId: creator-roles_list
      summary: List Creator Roles
      description: Get a list of creator positions (jobs).
      tags:
        - Creator Roles
      parameters:
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
        - name: page_size
          in: query
          description: Number of results to return per page.
          required: false
          schema:
            type: integer
        - name: key
          in: query
          description: API key for authentication.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of creator roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPositionList'
  /creators:
    get:
      operationId: creators_list
      summary: List Creators
      description: Get a list of game creators.
      tags:
        - Creators
      parameters:
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
        - name: page_size
          in: query
          description: Number of results to return per page.
          required: false
          schema:
            type: integer
        - name: key
          in: query
          description: API key for authentication.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of creators
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPersonList'
  /creators/{id}:
    get:
      operationId: creators_read
      summary: Get Creator Details
      description: Get details of the creator.
      tags:
        - Creators
      parameters:
        - name: id
          in: path
          description: A unique integer value identifying this Person.
          required: true
          schema:
            type: integer
        - name: key
          in: query
          description: API key for authentication.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Creator details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonSingle'
  /developers:
    get:
      operationId: developers_list
      summary: List Developers
      description: Get a list of game developers.
      tags:
        - Developers
      parameters:
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
        - name: page_size
          in: query
          description: Number of results to return per page.
          required: false
          schema:
            type: integer
        - name: key
          in: query
          description: API key for authentication.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of developers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeveloperList'
  /developers/{id}:
    get:
      operationId: developers_read
      summary: Get Developer Details
      description: Get details of the developer.
      tags:
        - Developers
      parameters:
        - name: id
          in: path
          description: A unique integer value identifying this Developer.
          required: true
          schema:
            type: integer
        - name: key
          in: query
          description: API key for authentication.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Developer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperSingle'
  /games:
    get:
      operationId: games_list
      summary: List Games
      description: Get a list of games with rich filtering options.
      tags:
        - Games
      parameters:
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
        - name: page_size
          in: query
          description: Number of results to return per page.
          required: false
          schema:
            type: integer
        - name: search
          in: query
          description: Search query.
          schema:
            type: string
        - name: search_precise
          in: query
          description: Disable fuzziness for the search query.
          schema:
            type: boolean
        - name: search_exact
          in: query
          description: Mark the search query as exact.
          schema:
            type: boolean
        - name: parent_platforms
          in: query
          description: 'Filter by parent platforms, for example: `1,2,3`.'
          schema:
            type: string
        - name: platforms
          in: query
          description: 'Filter by platforms, for example: `4,5`.'
          schema:
            type: string
        - name: stores
          in: query
          description: 'Filter by stores, for example: `5,6`.'
          schema:
            type: string
        - name: developers
          in: query
          description: 'Filter by developers, for example: `1612,18893` or `valve-software,feral-interactive`.'
          schema:
            type: string
        - name: publishers
          in: query
          description: 'Filter by publishers, for example: `354,20987` or `electronic-arts,microsoft-studios`.'
          schema:
            type: string
        - name: genres
          in: query
          description: 'Filter by genres, for example: `4,51` or `action,indie`.'
          schema:
            type: string
        - name: tags
          in: query
          description: 'Filter by tags, for example: `31,7` or `singleplayer,multiplayer`.'
          schema:
            type: string
        - name: creators
          in: query
          description: 'Filter by creators, for example: `78,28` or `cris-velasco,mike-morasky`.'
          schema:
            type: string
        - name: dates
          in: query
          description: 'Filter by a release date, for example: `2010-01-01,2018-12-31.1960-01-01,1969-12-31`.'
          schema:
            type: string
        - name: updated
          in: query
          description: 'Filter by an update date, for example: `2020-12-01,2020-12-31`.'
          schema:
            type: string
        - name: platforms_count
          in: query
          description: 'Filter by platforms count, for example: `1`.'
          schema:
            type: integer
        - name: metacritic
          in: query
          description: 'Filter by a metacritic rating, for example: `80,100`.'
          schema:
            type: string
        - name: exclude_collection
          in: query
          description: 'Exclude games from a particular collection, for example: `123`.'
          schema:
            type: integer
        - name: exclude_additions
          in: query
          description: Exclude additions.
          schema:
            type: boolean
        - name: exclude_parents
          in: query
          description: Exclude games which have additions.
          schema:
            type: boolean
        - name: exclude_game_series
          in: query
          description: Exclude games which included in a game series.
          schema:
            type: boolean
        - name: exclude_stores
          in: query
          description: 'Exclude stores, for example: `5,6`.'
          schema:
            type: string
        - name: ordering
          in: query
          description: 'Available fields: `name`, `released`, `added`, `created`, `updated`, `rating`, `metacritic`. You can reverse the sort order adding a hyphen, for example: `-released`.'
          schema:
            type: string
        - name: key
          in: query
          description: API key for authentication.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGameList'
  /games/{id}:
    get:
      operationId: games_read
      summary: Get Game Details
      description: Get details of the game.
      tags:
        - Games
      parameters:
        - name: id
          in: path
          description: An ID or a slug identifying this Game.
          required: true
          schema:
            type: string
        - name: key
          in: query
          description: API key for authentication.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSingle'
  /games/{game_pk}/additions:
    get:
      operationId: games_additions_list
      summary: List Game Additions
      description: "Get a list of DLC's for the game, GOTY and other editions, companion apps, etc."
