          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPublisherList'
  /publishers/{id}:
    get:
      operationId: publishers_read
      summary: Get Publisher Details
      description: Get details of the publisher.
      tags:
        - Publishers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Publisher details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublisherSingle'
  /stores:
    get:
      operationId: stores_list
      summary: List Stores
      description: Get a list of video game storefronts.
      tags:
        - Stores
      parameters:
        - name: ordering
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of stores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStoreList'
  /stores/{id}:
    get:
      operationId: stores_read
      summary: Get Store Details
      description: Get details of the store.
      tags:
        - Stores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSingle'
  /tags:
    get:
      operationId: tags_list
      summary: List Tags
      description: Get a list of tags.
      tags:
        - Tags
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTagList'
  /tags/{id}:
    get:
      operationId: tags_read
      summary: Get Tag Details
      description: Get details of the tag.
      tags:
        - Tags
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tag details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagSingle'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: key
  schemas:
    Position:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
    PaginatedPositionList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Position'
    Person:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        slug:
          type: string
          readOnly: true
        image:
          type: string
          format: uri
          readOnly: true
        image_background:
          type: string
          format: uri
          readOnly: true
        games_count:
          type: integer
          readOnly: true
    PersonSingle:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        slug:
          type: string
