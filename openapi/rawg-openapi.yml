        - name: page_size
          in: query
          schema:
            type: integer
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of games in the same series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGameList'
  /games/{game_pk}/parent-games:
    get:
      operationId: games_parent-games_list
      summary: List Game Parent Games
      description: "Get a list of parent games for DLC's and editions."
      tags:
        - Games
      parameters:
        - name: game_pk
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of parent games
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGameList'
  /games/{game_pk}/screenshots:
    get:
      operationId: games_screenshots_list
      summary: List Game Screenshots
      description: Get screenshots for the game.
      tags:
