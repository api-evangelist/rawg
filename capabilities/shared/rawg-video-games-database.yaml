naftiko: "1.0.0-alpha1"

info:
  label: "RAWG Video Games Database API"
  description: >-
    The largest open video games database providing access to 350,000+ games
    across 50+ platforms with rich metadata including genres, developers,
    publishers, creators, tags, storefronts, ESRB ratings, Metacritic scores,
    playtime, screenshots, achievements, and social data.
  tags:
    - RAWG
    - Video Games
    - Gaming
    - Game Discovery
    - Database
    - Entertainment
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RAWG_API_KEY: RAWG_API_KEY

capability:
  consumes:
    - type: http
      namespace: rawg
      baseUri: https://api.rawg.io/api
      description: "RAWG Video Games Database REST API"
      authentication:
        type: apikey
        key: key
        value: "{{RAWG_API_KEY}}"
        placement: query
      resources:
        - name: creator-roles
          path: /creator-roles
          description: "Game creator position and job role types"
          operations:
            - name: list-creator-roles
              method: GET
              description: "Get a list of creator positions (jobs)"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: creators
          path: /creators
          description: "Individual game creators and development team members"
          operations:
            - name: list-creators
              method: GET
              description: "Get a list of game creators"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-creator
              method: GET
              description: "Get details of the creator"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Creator ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: developers
          path: /developers
          description: "Game development studios and companies"
          operations:
            - name: list-developers
              method: GET
              description: "Get a list of game developers"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-developer
              method: GET
              description: "Get details of the developer"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Developer ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: games
          path: /games
          description: "Video games catalog with metadata and filtering"
          operations:
            - name: list-games
              method: GET
              description: "Get a list of games with rich filtering options"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search query"
                - name: platforms
                  in: query
                  type: string
                  required: false
                  description: "Filter by platform IDs"
                - name: genres
                  in: query
                  type: string
                  required: false
                  description: "Filter by genre IDs or slugs"
                - name: developers
                  in: query
                  type: string
                  required: false
                  description: "Filter by developer IDs or slugs"
                - name: publishers
                  in: query
                  type: string
                  required: false
                  description: "Filter by publisher IDs or slugs"
                - name: tags
                  in: query
                  type: string
                  required: false
                  description: "Filter by tag IDs or slugs"
                - name: dates
                  in: query
                  type: string
                  required: false
                  description: "Filter by release date range"
                - name: metacritic
                  in: query
                  type: string
                  required: false
                  description: "Filter by Metacritic score range"
                - name: ordering
                  in: query
                  type: string
                  required: false
                  description: "Sort field (name, released, rating, metacritic)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-game
              method: GET
              description: "Get details of the game"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-additions
              method: GET
              description: "Get a list of DLCs for the game"
              inputParameters:
                - name: game_pk
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-development-team
              method: GET
              description: "Get individual creators on the development team"
              inputParameters:
                - name: game_pk
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-series
              method: GET
              description: "Get games that are part of the same series"
              inputParameters:
                - name: game_pk
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-parent-games
              method: GET
              description: "Get parent games for DLCs and editions"
              inputParameters:
                - name: game_pk
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-screenshots
              method: GET
              description: "Get screenshots for the game"
              inputParameters:
                - name: game_pk
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-stores
              method: GET
              description: "Get links to stores that sell the game"
              inputParameters:
                - name: game_pk
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-achievements
              method: GET
              description: "Get a list of game achievements"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-trailers
              method: GET
              description: "Get a list of game trailers"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-game-reddit-posts
              method: GET
              description: "Get recent posts from the game subreddit"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-suggested-games
              method: GET
              description: "Get visually similar games (enterprise tier)"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Game ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: genres
          path: /genres
          description: "Video game genre categories"
          operations:
            - name: list-genres
              method: GET
              description: "Get a list of video game genres"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: ordering
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-genre
              method: GET
              description: "Get details of the genre"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Genre ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: platforms
          path: /platforms
          description: "Gaming hardware and software platforms"
          operations:
            - name: list-platforms
              method: GET
              description: "Get a list of video game platforms"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: ordering
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-parent-platforms
              method: GET
              description: "Get a list of parent platforms"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-platform
              method: GET
              description: "Get details of the platform"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Platform ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: publishers
          path: /publishers
          description: "Game publishing companies"
          operations:
            - name: list-publishers
              method: GET
              description: "Get a list of video game publishers"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-publisher
              method: GET
              description: "Get details of the publisher"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Publisher ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: stores
          path: /stores
          description: "Digital and physical game storefronts"
          operations:
            - name: list-stores
              method: GET
              description: "Get a list of video game storefronts"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: ordering
                  in: query
                  type: string
                  required: false
                  description: "Sort field"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-store
              method: GET
              description: "Get details of the store"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Store ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tags
          path: /tags
          description: "Descriptive game tags and labels"
          operations:
            - name: list-tags
              method: GET
              description: "Get a list of tags"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-tag
              method: GET
              description: "Get details of the tag"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Tag ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: rawg-rest
      resources:
        - path: /v1/creator-roles
          name: creator-roles
          description: "Game creator position types"
          operations:
            - method: GET
              name: list-creator-roles
              description: "List creator roles"
              call: "rawg.list-creator-roles"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/creators
          name: creators
          description: "Game creators"
          operations:
            - method: GET
              name: list-creators
              description: "List creators"
              call: "rawg.list-creators"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/creators/{id}
          name: creator-detail
          description: "Creator detail"
          operations:
            - method: GET
              name: get-creator
              description: "Get creator detail"
              call: "rawg.get-creator"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/games
          name: games
          description: "Video games"
          operations:
            - method: GET
              name: list-games
              description: "List games with filtering"
              call: "rawg.list-games"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/games/{id}
          name: game-detail
          description: "Game detail"
          operations:
            - method: GET
              name: get-game
              description: "Get game detail"
              call: "rawg.get-game"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/genres
          name: genres
          description: "Video game genres"
          operations:
            - method: GET
              name: list-genres
              description: "List genres"
              call: "rawg.list-genres"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/platforms
          name: platforms
          description: "Gaming platforms"
          operations:
            - method: GET
              name: list-platforms
              description: "List platforms"
              call: "rawg.list-platforms"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/publishers
          name: publishers
          description: "Game publishers"
          operations:
            - method: GET
              name: list-publishers
              description: "List publishers"
              call: "rawg.list-publishers"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/stores
          name: stores
          description: "Game storefronts"
          operations:
            - method: GET
              name: list-stores
              description: "List storefronts"
              call: "rawg.list-stores"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tags
          name: tags
          description: "Game tags"
          operations:
            - method: GET
              name: list-tags
              description: "List tags"
              call: "rawg.list-tags"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: rawg-mcp
      transport: http
      tools:
        - name: list-creator-roles
          description: "Get a list of game creator position types"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-creator-roles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-creators
          description: "Get a list of game creators"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-creators"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-creator
          description: "Get details of a specific game creator"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-creator"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-developers
          description: "Get a list of game development studios"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-developers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-developer
          description: "Get details of a game developer"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-developer"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-games
          description: "Search and filter games by platform, genre, developer, publisher, tag, date, or Metacritic score"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-games"
          with:
            search: "tools.search"
            platforms: "tools.platforms"
            genres: "tools.genres"
            developers: "tools.developers"
            publishers: "tools.publishers"
            tags: "tools.tags"
            dates: "tools.dates"
            metacritic: "tools.metacritic"
            ordering: "tools.ordering"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-game
          description: "Get full details of a video game by ID or slug"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-game"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-additions
          description: "List DLCs and editions for a game"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-additions"
          with:
            game_pk: "tools.game_pk"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-development-team
          description: "List individual creators on a game's development team"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-development-team"
          with:
            game_pk: "tools.game_pk"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-series
          description: "List other games in the same series"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-series"
          with:
            game_pk: "tools.game_pk"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-screenshots
          description: "List screenshots for a game"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-screenshots"
          with:
            game_pk: "tools.game_pk"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-stores
          description: "List stores where a game can be purchased"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-stores"
          with:
            game_pk: "tools.game_pk"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-achievements
          description: "List achievements for a game"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-achievements"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-trailers
          description: "List trailers and video content for a game"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-trailers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-game-reddit-posts
          description: "List recent posts from a game's subreddit"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-game-reddit-posts"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-suggested-games
          description: "List visually similar game suggestions (enterprise tier)"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-suggested-games"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-genres
          description: "Get all video game genres"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-genres"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-genre
          description: "Get details of a specific game genre"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-genre"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-platforms
          description: "Get all gaming platforms"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-platforms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-parent-platforms
          description: "Get parent platform groupings (PlayStation, Xbox, etc.)"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-parent-platforms"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-platform
          description: "Get details of a specific gaming platform"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-platform"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-publishers
          description: "Get all game publishers"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-publishers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-publisher
          description: "Get details of a specific game publisher"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-publisher"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-stores
          description: "Get all digital and physical game storefronts"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-stores"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-store
          description: "Get details of a specific game storefront"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-store"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tags
          description: "Get all game tags and descriptive keywords"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.list-tags"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-tag
          description: "Get details of a specific game tag"
          hints:
            readOnly: true
            idempotent: true
          call: "rawg.get-tag"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
