    - name: games-game_pk-screenshots
      path: /games/{game_pk}/screenshots
      operations:
      - name: gamesscreenshotslist
        method: GET
        description: Get screenshots for the game.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ordering
          in: query
          type: string
          description: Which field to use when ordering the results.
        - name: page
          in: query
          type: integer
          description: A page number within the paginated result set.
        - name: page_size
          in: query
          type: integer
          description: Number of results to return per page.
    - name: games-game_pk-stores
      path: /games/{game_pk}/stores
      operations:
      - name: gamesstoreslist
        method: GET
        description: Get links to the stores that sell the game.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ordering
          in: query
          type: string
          description: Which field to use when ordering the results.
        - name: page
          in: query
          type: integer
          description: A page number within the paginated result set.
        - name: page_size
          in: query
          type: integer
          description: Number of results to return per page.
    - name: games-id
      path: /games/{id}
      operations:
      - name: gamesread
        method: GET
        description: Get details of the game.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: An ID or a slug identifying this Game.
          required: true
    - name: games-id-achievements
      path: /games/{id}/achievements
      operations:
      - name: gamesachievementsread
        method: GET
        description: Get a list of game achievements.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
