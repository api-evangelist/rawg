naftiko: 1.0.0-alpha2
info:
  label: RAWG Video Games Database API — creators
  description: 'RAWG Video Games Database API — creators. 2 operations. Lead operation: Get a list of game creators.. Self-contained
    Naftiko capability covering one Rawg business surface.'
  tags:
  - Rawg
  - creators
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAWG_API_KEY: RAWG_API_KEY
capability:
  consumes:
  - type: http
    namespace: rawg-creators
    baseUri: https://api.rawg.io/api
    description: RAWG Video Games Database API — creators business capability. Self-contained, no shared references.
    resources:
    - name: creators
      path: /creators
      operations:
      - name: creatorslist
        method: GET
        description: Get a list of game creators.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: A page number within the paginated result set.
        - name: page_size
          in: query
          type: integer
          description: Number of results to return per page.
    - name: creators-id
      path: /creators/{id}
      operations:
      - name: creatorsread
        method: GET
        description: Get details of the creator.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: rawg-creators-rest
    port: 8080
    description: REST adapter for RAWG Video Games Database API — creators. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/creators
      name: creators
      description: REST surface for creators.
      operations:
      - method: GET
        name: creatorslist
        description: Get a list of game creators.
        call: rawg-creators.creatorslist
        with:
          page: rest.page
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/creators/{id}
      name: creators-id
      description: REST surface for creators-id.
      operations:
      - method: GET
        name: creatorsread
        description: Get details of the creator.
        call: rawg-creators.creatorsread
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rawg-creators-mcp
    port: 9090
    transport: http
    description: MCP adapter for RAWG Video Games Database API — creators. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-list-game-creators
      description: Get a list of game creators.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rawg-creators.creatorslist
      with:
        page: tools.page
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: get-details-creator
      description: Get details of the creator.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rawg-creators.creatorsread
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
