naftiko: 1.0.0-alpha2
info:
  label: RAWG Video Games Database API — tags
  description: 'RAWG Video Games Database API — tags. 2 operations. Lead operation: Get a list of tags.. Self-contained Naftiko
    capability covering one Rawg business surface.'
  tags:
  - Rawg
  - tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RAWG_API_KEY: RAWG_API_KEY
capability:
  consumes:
  - type: http
    namespace: rawg-tags
    baseUri: https://api.rawg.io/api
    description: RAWG Video Games Database API — tags business capability. Self-contained, no shared references.
    resources:
    - name: tags
      path: /tags
      operations:
      - name: tagslist
        method: GET
        description: Get a list of tags.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: A page number within the paginated result set.
        - name: page_size
          in: query
          type: integer
          description: Number of results to return per page.
    - name: tags-id
      path: /tags/{id}
      operations:
      - name: tagsread
        method: GET
        description: Get details of the tag.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rawg-tags-rest
    port: 8080
    description: REST adapter for RAWG Video Games Database API — tags. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tags
      name: tags
      description: REST surface for tags.
      operations:
      - method: GET
        name: tagslist
        description: Get a list of tags.
        call: rawg-tags.tagslist
        with:
          page: rest.page
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags/{id}
      name: tags-id
      description: REST surface for tags-id.
      operations:
      - method: GET
        name: tagsread
        description: Get details of the tag.
        call: rawg-tags.tagsread
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rawg-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for RAWG Video Games Database API — tags. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-list-tags
      description: Get a list of tags.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rawg-tags.tagslist
      with:
        page: tools.page
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: get-details-tag
      description: Get details of the tag.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rawg-tags.tagsread
      outputParameters:
      - type: object
        mapping: $.
